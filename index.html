<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1 class="page-title">Blow the Candle 🎂</h1>

  <div class="content">

    <!-- Webcam area for hand detection -->
    <div class="webcam">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <!-- Cake and lighter -->
    <div class="cake-area">
      <img src="assets/cake_unlit.gif" class="cake" id="cake" alt="Unlit Birthday Cake">
      <img src="assets/lighter.gif" class="lighter" id="lighter" alt="Lighter">
    </div>

  </div>

  <!-- Mediapipe Hands library -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <!-- Your JS -->
  <script src="script.js"></script>

</body>

</html>
